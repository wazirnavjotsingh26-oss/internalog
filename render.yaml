services:
  - type: web
    name: intern-alog-012
    env: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      cd frontend
      npm ci
      npm run build
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 120 backend.wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      # Set these in Render dashboard (do not commit secrets):
      # - MONGO_URI
      # - ADMIN_PASSWORD
      # - GOOGLE_PLACES_API_KEY (optional)

