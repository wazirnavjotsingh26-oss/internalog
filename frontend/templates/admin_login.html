<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CemeteryBase — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }

    .login-title {
      text-align: center;
      margin-bottom: 32px;
      color: var(--gray-900);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-field {
      padding: 16px 20px;
      border: 2px solid var(--gray-200);
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    .login-field:focus {
      outline: none;
      border-color: var(--primary);
    }

    .login-btn {
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .login-error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      border-left: 4px solid #c33;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h1 class="login-title">⚜ CemeteryBase Admin</h1>
    <form id="loginForm" class="login-form">
      <input type="password" id="password" class="login-field" placeholder="Enter admin password" autocomplete="off">
      <button type="submit" class="login-btn">Login →</button>
    </form>
    <div id="loginError" class="login-error" style="display:none;"></div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/admin';
        } else {
          document.getElementById('loginError').textContent = data.error || 'Login failed';
          document.getElementById('loginError').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('loginError').textContent = 'Connection error';
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>
</body>

</html>
